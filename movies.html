<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies – CineVault</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">CINE<span>VAULT</span></a>
    <ul class="nav-menu" id="nav-menu">
      <li><a href="index.html"     class="nav-link">Home</a></li>
      <li><a href="movies.html"    class="nav-link">Movies</a></li>
      <li><a href="watchlist.html" class="nav-link">Watchlist</a></li>
      <li><a href="reviews.html"   class="nav-link">Reviews</a></li>
      <li><a href="account.html"   class="nav-link">Account</a></li>
    </ul>
    <button class="menu-toggle" id="menu-toggle">☰</button>
  </nav>

  <div class="page-header">
    <h1>All Movies</h1>
    <p>Browse, search, and filter our full collection.</p>
  </div>

  <div class="filter-bar">
    <input type="text" id="search-input" class="search-input" placeholder="🔍  Search movies..." />

    <select id="genre-filter" class="filter-select">
      <option value="all">All Genres</option>
      <option value="Action">Action</option>
      <option value="Drama">Drama</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Thriller">Thriller</option>
      <option value="Horror">Horror</option>
    </select>

    <select id="sort-select" class="filter-select">
      <option value="default">Sort: Default</option>
      <option value="rating-high">Rating: High to Low</option>
      <option value="rating-low">Rating: Low to High</option>
      <option value="year-new">Year: Newest First</option>
      <option value="year-old">Year: Oldest First</option>
      <option value="title-az">Title: A–Z</option>
    </select>

    <span class="results-count" id="results-count"></span>
  </div>

  <section class="section section-no-top" style="padding-top:30px;">
    <div class="movies-grid" id="movies-grid"></div>
    <div id="no-results" class="empty-state hidden">
      <div class="empty-icon">🎬</div>
      <h2>No movies found</h2>
      <p>Try a different search or filter.</p>
    </div>
  </section>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <img class="modal-poster" id="modal-poster" src="" alt="Movie Poster" />
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta">
          <span class="modal-genre-tag" id="modal-genre"></span>
          <span class="modal-rating-tag" id="modal-rating"></span>
          <span class="modal-year-tag"   id="modal-year"></span>
        </div>
        <p class="modal-desc" id="modal-desc"></p>
        <button class="btn-primary" id="modal-watchlist-btn">+ Add to Watchlist</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Made with <span>♥</span> by CineVault &copy; 2024 — A College Mini Project</p>
  </footer>

  <script src="script.js"></script>
  <script>
    let currentSearch = "";
    let currentGenre  = "all";
    let currentSort   = "default";

    function renderMovies() {
      let filtered = movies.filter(m =>
        m.title.toLowerCase().includes(currentSearch.toLowerCase())
      );

      if (currentGenre !== "all") {
        filtered = filtered.filter(m => m.genre === currentGenre);
      }

      if      (currentSort === "rating-high") filtered.sort((a, b) => b.rating - a.rating);
      else if (currentSort === "rating-low")  filtered.sort((a, b) => a.rating - b.rating);
      else if (currentSort === "year-new")    filtered.sort((a, b) => b.year - a.year);
      else if (currentSort === "year-old")    filtered.sort((a, b) => a.year - b.year);
      else if (currentSort === "title-az")    filtered.sort((a, b) => a.title.localeCompare(b.title));

      const grid        = document.getElementById("movies-grid");
      const noResults   = document.getElementById("no-results");
      const resultsCount = document.getElementById("results-count");

      if (filtered.length === 0) {
        grid.innerHTML = "";
        noResults.classList.remove("hidden");
        resultsCount.textContent = "0 movies";
      } else {
        noResults.classList.add("hidden");
        grid.innerHTML = filtered.map(m => buildMovieCard(m)).join("");
        resultsCount.textContent = `${filtered.length} movie${filtered.length !== 1 ? "s" : ""}`;
      }
    }

    document.getElementById("search-input").addEventListener("input", function() {
      currentSearch = this.value;
      renderMovies();
    });

    document.getElementById("genre-filter").addEventListener("change", function() {
      currentGenre = this.value;
      renderMovies();
    });

    document.getElementById("sort-select").addEventListener("change", function() {
      currentSort = this.value;
      renderMovies();
    });

    const urlParams  = new URLSearchParams(window.location.search);
    const genreParam = urlParams.get("genre");
    if (genreParam) {
      currentGenre = genreParam;
      document.getElementById("genre-filter").value = genreParam;
    }

    renderMovies();
  </script>

</body>
</html>
